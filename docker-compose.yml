services:
  postgres:
    image: postgres:16
    container_name: payment-postgres
    environment:
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_pass
      POSTGRES_DB: payment_db
    ports:
      - "5432:5432"
    volumes:
      - payment_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: payment-redis
    ports:
      - "6379:6379"

  payment-platform-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-platform-api
    ports:
      - "3000:3000"
    environment:
      APP_PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: payment_user
      DB_PASSWORD: payment_pass
      DB_NAME: payment_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OUTBOX_PUBLISHER_ENABLED: "false"
      PAYMENT_CONSUMER_ENABLED: "false"
    depends_on:
      - postgres
      - redis

  payment-platform-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-platform-worker
    command: ["node", "dist/worker.js"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: payment_user
      DB_PASSWORD: payment_pass
      DB_NAME: payment_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OUTBOX_PUBLISHER_ENABLED: "true"
      PAYMENT_CONSUMER_ENABLED: "true"
    depends_on:
      - postgres
      - redis
  localstack:
    image: localstack/localstack:latest
    container_name: payment-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs
      AWS_DEFAULT_REGION: us-east-1
volumes:
  payment_postgres_data: